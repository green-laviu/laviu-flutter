name: laviu_flutter
description: "A new Flutter project."

publish_to: 'none' 













version: 1.0.0+1

environment:
  sdk: ^3.8.0







dependencies:
  flutter:
    sdk: flutter

  
  
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1           # 상태관리를 위한 Riverpod 라이브러리 (Provider 기반, 안전하고 모듈화에 유리함)
  dio: ^5.8.0+1                      # HTTP 통신을 위한 강력한 클라이언트 (API 요청, 응답, 에러 처리, 인터셉터 지원 등)
  validators: ^3.0.0                 # 이메일, URL 등 다양한 입력값 유효성 검사를 위한 유틸 함수 모음
  flutter_lints: ^5.0.0              # Flutter 공식 권장 코드 스타일 및 린트 설정 모음 (개발 시 코드 품질 관리용)
  intl: ^0.20.2                      # 날짜, 시간, 숫자, 통화 등의 국제화/지역화 포맷을 지원하는 패키지
  logger: ^2.6.1                     # 콘솔 로그 출력을 예쁘고 체계적으로 출력해주는 디버깅용 라이브러리
  flutter_secure_storage: ^9.2.4     # 민감한 정보를 안전하게 저장 (토큰 등) — Android/iOS 플랫폼의 보안 저장소(KeyStore/Keychain) 사용
  cached_network_image: ^3.4.1       # 네트워크 이미지를 캐싱해서 표시해주는 위젯 (로딩 속도 개선, 네트워크 절약)
  pull_to_refresh: ^2.0.0            # 리스트를 아래로 끌어당겨 새로고침(Pull to Refresh) 기능을 쉽게 구현 가능
  google_fonts: ^6.3.0               # 구글 폰트를 쉽게 적용할 수 있는 라이브러리 (TextStyle에 원하는 폰트 지정 가능)
  flutter_dotenv: ^5.2.1             # .env 파일의 환경변수(BASE_URL 등)를 Flutter 앱에서 불러오기 위한 패키지
  flutter_svg: ^2.2.0                # SVG(벡터) 이미지를 Flutter 위젯으로 렌더링할 수 있는 라이브러리 (해상도에 무관하게 선명하게 표시 가능)
  animated_text_kit: ^4.2.3          # 다양한 텍스트 애니메이션 효과를 쉽게 적용할 수 있는 라이브러리 (타이핑, 페이드, 스케일 등)
  apivideo_live_stream: ^1.2.0       # RTMP 방송 송출을 위한 API.video 라이브 스트림 SDK
  wakelock_plus: ^1.3.2              # 화면 꺼짐 방지 (동영상 재생, 라이브 방송 등에서 필요)
  video_player: ^2.10.0
  stomp_dart_client: ^2.1.3
  web_socket_channel: ^3.0.3






dev_dependencies:
  flutter_test:
    sdk: flutter

  
  
  
  
  
  flutter_lints: ^5.0.0





flutter:

  
  
  
  uses-material-design: true

  
  assets:
    - assets/images/
    - assets/icons/
    - assets/mock/search.json
    - assets/mock/home_feed.json
    - assets/mock/following.json
    - .env

  
  

  
  

  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
